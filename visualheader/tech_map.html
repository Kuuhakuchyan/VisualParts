<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>科技感中国地图</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- 使用阿里云GeoJSON数据源 -->
    <style>
        body {
            margin: 0;
            background-color: #0f1621;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #china-map {
            width: 100%;
            height: 100vh;
        }
        #back-to-china {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: #1a2b5a;
            color: #fff;
            border: 1px solid #0a2dae;
            border-radius: 4px;
            cursor: pointer;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="china-map"></div>
    <button id="back-to-china">返回全国视图</button>
    <button id="back-to-main" style="position: fixed; top: 20px; left: 20px; padding: 8px 16px; background: #1a2b5a; color: #fff; border: 1px solid #0a2dae; border-radius: 4px; cursor: pointer; z-index: 100;">返回主平台</button>

    <script>
        $(function() {
            const mapChart = echarts.init(document.getElementById('china-map'));
            
            // 科技感地图配置
            const techMapOption = {
                backgroundColor: '#0f1621',
                geo: {
                    map: 'china',
                    roam: true,
                    itemStyle: {
                        areaColor: '#1a2b5a',
                        borderColor: '#0a2dae',
                        borderWidth: 2,
                        shadowColor: 'rgba(0, 0, 0, 0.5)',
                        shadowBlur: 10
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#2a91d8',
                            borderWidth: 3
                        },
                        label: {
                            show: true,
                            color: '#fff',
                            fontSize: 14
                        }
                    }
                }
            };

            // 省份详细视图配置
            const provinceOption = (provinceName) => ({
                backgroundColor: '#0f1621',
                title: {
                    text: provinceName,
                    left: 'center',
                    textStyle: {
                        color: '#fff'
                    }
                },
                geo: {
                    map: provinceName,
                    roam: true,
                    itemStyle: {
                        areaColor: '#1a2b5a',
                        borderColor: '#0a2dae',
                        borderWidth: 1
                    }
                }
            });

            // 加载地图数据
            $.get('https://geo.datav.aliyun.com/areas_v3/bound/100000_full.json', function(geoJson) {
                echarts.registerMap('china', geoJson);
                mapChart.setOption(techMapOption);

                // 省份点击事件 - 跳转到对应省份页面
                mapChart.on('click', function(params) {
                    // 安全地记录点击事件参数
                    const safeParams = {
                        name: params.name,
                        componentType: params.componentType,
                        geoIndex: params.geoIndex
                    };
                    console.log('安全事件参数:', safeParams);
                    
                    if (params.componentType === 'geo') {
                        const basePath = window.location.href.replace('tech_map.html', '');
                        // 省份名称到 adcode 的映射
                        const adcodeMap = {
                            '北京': '110000', '天津': '120000', '河北': '130000', '山西': '140000',
                            '内蒙古': '150000', '辽宁': '210000', '吉林': '220000', '黑龙江': '230000',
                            '上海': '310000', '江苏': '320000', '浙江': '330000', '安徽': '340000',
                            '福建': '350000', '江西': '360000', '山东': '370000', '河南': '410000',
                            '湖北': '420000', '湖南': '430000', '广东': '440000', '广西': '450000',
                            '海南': '460000', '重庆': '500000', '四川': '510000', '贵州': '520000',
                            '云南': '530000', '西藏': '540000', '陕西': '610000', '甘肃': '620000',
                            '青海': '630000', '宁夏': '640000', '新疆': '650000', '台湾': '710000',
                            '香港': '810000', '澳门': '820000'
                        };
                        // 模糊匹配：支持全称和简称
                        const adcode = adcodeMap[params.name] ||
                            Object.entries(adcodeMap).find(([k]) => k.includes(params.name) || params.name.includes(k))?.[1];

                        if (adcode) {
                            const targetUrl = basePath + 'province.html?adcode=' + adcode;
                            console.log('跳转: ' + params.name + ' → ' + targetUrl);
                            setTimeout(() => { window.location.href = targetUrl; }, 100);
                        } else {
                            console.warn('未匹配到 adcode: ' + params.name);
                        }
                    }
                });
            });

            // 返回全国视图
            // 返回主平台
            $('#back-to-main').click(function() {
                window.location.href = '../visualheader/testB.html'; // 更新为正确路径
            });

            // 返回全国视图
            $('#back-to-china').click(function() {
                mapChart.setOption(techMapOption);
                $(this).hide();
            });
        });
    </script>
</body>
</html>
