            },

            // 处理DEM文件（保持原有）
            async handleDEM(file) {
                // 保持原有的DEM处理逻辑
                this.showLoading(true, '处理栅格文件', '读取GeoTIFF...');

                try {
                    console.log('开始处理DEM文件:', file.name);
                    const arrayBuffer = await file.arrayBuffer();

                    this.updateLoadingProgress('解析GeoTIFF', '读取元数据...');
                    const tiff = await GeoTIFF.fromArrayBuffer(arrayBuffer);
                    const image = await tiff.getImage();

                    // 获取图像基本信息
                    const width = image.getWidth();
                    const height = image.getHeight();
                    const totalPixels = width * height;

                    console.log(`DEM尺寸: ${width} x ${height}, 总像素: ${totalPixels}`);

                    // 大文件预警
                    if (totalPixels > 10000000) {
                        const confirm = await this.showConfirm(
                            '大文件警告',
                            `文件包含 ${(totalPixels / 1000000).toFixed(1)}M 像素，处理可能较慢。是否继续？`
                        );
                        if (!confirm) {
                            this.showLoading(false);
                            return;
                        }
                    }

                    this.updateLoadingProgress('获取坐标信息', '计算边界...');

                    // 获取边界框
                    const bbox = image.getBoundingBox();
                    console.log('原始边界框:', bbox);

                    if (!bbox || bbox.length !== 4 ||
                        !isFinite(bbox[0]) || !isFinite(bbox[1]) ||
                        !isFinite(bbox[2]) || !isFinite(bbox[3])) {
                        throw new Error('DEM文件边界信息无效');
                    }

                    // 检测并转换坐标系
                    let convertedBbox = bbox;
                    let needsConversion = false;

                    if (Math.abs(bbox[0]) > 180 || Math.abs(bbox[2]) > 180 ||
                        Math.abs(bbox[1]) > 90 || Math.abs(bbox[3]) > 90) {
                        console.log('检测到投影坐标系，尝试转换...');
                        needsConversion = true;

                        this.updateLoadingProgress('转换坐标系', '处理投影坐标...');
                        convertedBbox = await this.convertProjectedCoordinates(bbox, image);

                        if (convertedBbox) {
                            console.log('坐标转换成功:', convertedBbox);
                        } else {
                            console.log('自动转换失败，尝试经验转换...');
                            convertedBbox = this.fallbackCoordinateConversion(bbox);
                        }
                    }

                    console.log('最终使用的边界框:', convertedBbox);

                    this.updateLoadingProgress('读取栅格数据', '分析数值...');

                    // 读取栅格数据
                    const rasters = await image.readRasters();
                    const data = rasters[0];
                    console.log('数据类型:', data.constructor.name, '数据长度:', data.length);

                    // 计算高程统计
                    let min = Infinity, max = -Infinity;
                    let validCount = 0;
                    let sum = 0;

                    this.updateLoadingProgress('统计数据', '计算范围...');

                    // 分批处理大数据
                    const batchSize = 100000;
                    for (let i = 0; i < data.length; i += batchSize) {
                        const batch = data.slice(i, Math.min(i + batchSize, data.length));

                        for (let j = 0; j < batch.length; j++) {
                            const value = batch[j];
                            if (value !== -9999 && value !== -32768 && value !== null &&
                                !isNaN(value) && isFinite(value) && value >= 0 && value < 65535) {
                                min = Math.min(min, value);
                                max = Math.max(max, value);
                                sum += value;
                                validCount++;
                            }
                        }

                        // 更新进度
                        const progress = Math.round(((i + batch.length) / data.length) * 100);
                        this.updateLoadingProgress('统计数据', `${progress}% 完成`);

                        // 让出控制权，保持UI响应
                        if (i % (batchSize * 10) === 0) {
                            await new Promise(resolve => setTimeout(resolve, 10));
                        }
                    }

                    if (validCount === 0) {
                        throw new Error('DEM文件中没有有效数据');
                    }

                    const avg = sum / validCount;
                    console.log(`数据统计 - 最小值: ${min}, 最大值: ${max}, 平均值: ${avg.toFixed(2)}, 有效像素: ${validCount}`);

                    this.updateLoadingProgress('创建图层', '生成热力点...');

                    // 创建Leaflet边界
                    const bounds = L.latLngBounds([
                        [convertedBbox[1], convertedBbox[0]], // 西南角
                        [convertedBbox[3], convertedBbox[2]]  // 东北角
                    ]);

                    if (!bounds.isValid()) {
                        throw new Error('转换后的边界坐标无效');
                    }

                    // 智能采样创建热力图显示点
                    const heatPoints = await this.createDEMHeatPointsOptimized(
                        data, width, height, convertedBbox, min, max
                    );

                    if (heatPoints.length === 0) {
                        throw new Error('无法生成有效的显示点，请检查坐标系是否正确');
                    }

                    console.log(`生成了 ${heatPoints.length} 个热力点`);

                    this.updateLoadingProgress('构建图层', '配置渲染...');

                    // 创建DEM图层组
                    const demLayerGroup = L.layerGroup();

                    // 根据数据特征选择合适的颜色方案
                    let gradient;
                    if (file.name.toLowerCase().includes('ntl') || file.name.toLowerCase().includes('light')) {
                        gradient = {
                            0.0: '#000033', 0.2: '#000066', 0.4: '#003399',
                            0.6: '#FFAA00', 0.8: '#FF6600', 1.0: '#FFFF00'
                        };
                    } else {
                        gradient = {
                            0.0: '#000080', 0.2: '#0040FF', 0.4: '#00FFFF',
                            0.6: '#40FF40', 0.8: '#FFFF00', 1.0: '#FF4040'
                        };
                    }

                    // 创建热力图层
                    const heatLayer = L.heatLayer(heatPoints, {
                        radius: Math.max(15, Math.min(40, Math.sqrt(width * height) / 200)),
                        blur: 20,
                        maxZoom: 18,
                        minOpacity: 0.3,
                        gradient: gradient
                    });

                    demLayerGroup.addLayer(heatLayer);

                    // 添加边界框
                    const boundaryRect = L.rectangle(bounds, {
                        color: needsConversion ? '#ff6b6b' : '#4CAF50',
                        weight: 2,
                        fillOpacity: 0,
                        dashArray: '8, 4'
                    });

                    demLayerGroup.addLayer(boundaryRect);

                    // 创建信息弹窗
                    const dataType = file.name.toLowerCase().includes('ntl') || file.name.toLowerCase().includes('light') ? '夜光数据' : '地形数据';
                    const coordSystem = needsConversion ? '投影坐标系(已转换)' : 'WGS84';

                    const popupContent = `
                        <div style="min-width: 240px;">
                            <h4 style="margin: 0 0 10px 0; color: #2c3e50;">${dataType}: ${file.name}</h4>
                            <div style="font-size: 13px; line-height: 1.5;">
                                <div><strong>数据类型:</strong> ${dataType}</div>
                                <div><strong>坐标系:</strong> ${coordSystem}</div>
                                <div><strong>分辨率:</strong> ${width} × ${height}</div>
                                <div><strong>数值范围:</strong> ${min.toFixed(2)} - ${max.toFixed(2)}</div>
                                <div><strong>平均值:</strong> ${avg.toFixed(2)}</div>
                                <div><strong>有效像素:</strong> ${validCount.toLocaleString()}</div>
                                <div><strong>数据覆盖率:</strong> ${((validCount / data.length) * 100).toFixed(1)}%</div>
                                <div><strong>热力点数:</strong> ${heatPoints.length}</div>
                            </div>
                        </div>
                    `;

                    boundaryRect.bindPopup(popupContent);

                    // 添加到地图
                    if (this.currentMapType === 'gis') {
                        demLayerGroup.addTo(this.map);
                    }

                    // 添加到图层管理
                    this.layers.push({
                        id: 'dem_' + Date.now(),
                        name: `${dataType}: ${file.name.replace(/\.(tif|tiff)$/i, '')}`,
                        layer: demLayerGroup,
                        type: 'raster',
                        visible: true,
                        features: heatPoints.length,
                        statistics: {
                            min: min.toFixed(2),
                            max: max.toFixed(2),
                            avg: avg.toFixed(2),
                            resolution: `${width}×${height}`,
                            coverage: `${((validCount / data.length) * 100).toFixed(1)}%`,
                            coordSystem: coordSystem
                        }
                    });

                    this.updateLayerList();
                    this.updateStatistics();

                    // 智能缩放
                    if (this.currentMapType === 'gis') {
                        const center = bounds.getCenter();
                        if (Math.abs(center.lat) <= 85 && Math.abs(center.lng) <= 180) {
                            this.map.fitBounds(bounds, {
                                padding: [30, 30],
                                maxZoom: 12
                            });
                        }
                    }

                    this.showToast('数据加载成功',
                        `${dataType}已加载\n优化渲染: ${heatPoints.length} 点`, 'success');

                } catch (error) {
                    console.error('DEM处理错误:', error);
                    this.showToast('数据处理失败',
                        `文件: ${file.name}\n错误: ${error.message}`, 'error');
                } finally {
                    this.showLoading(false);
                }
            },

            // 优化的热力点创建（异步版本）
            async createDEMHeatPointsOptimized(data, width, height, bbox, min, max) {
                const heatPoints = [];
                const elevationRange = max - min;

                if (elevationRange <= 0) {
                    console.warn('高程范围无效');
                    return heatPoints;
                }

                // 智能采样策略
                const totalPixels = width * height;
                let step;

                if (totalPixels > 5000000) {
                    step = Math.floor(Math.sqrt(totalPixels) / 50);  // 超大文件：极稀疏采样
                } else if (totalPixels > 1000000) {
                    step = Math.floor(Math.sqrt(totalPixels) / 80);  // 大文件：稀疏采样
                } else if (totalPixels > 100000) {
                    step = Math.floor(Math.sqrt(totalPixels) / 60);  // 中等文件：中等采样
                } else {
                    step = Math.max(1, Math.floor(Math.sqrt(totalPixels) / 40));  // 小文件：密集采样
                }

                step = Math.max(1, step);
                console.log(`DEM采样步长: ${step}, 总像素: ${totalPixels}`);

                let pointCount = 0;
                const maxPoints = 3000; // 增加最大点数限制
                const batchSize = 1000;  // 批处理大小

                // 分批处理以保持响应性
                for (let y = 0; y < height && pointCount < maxPoints; y += step) {
                    const batchPoints = [];

                    for (let x = 0; x < width && pointCount < maxPoints; x += step) {
                        const idx = y * width + x;
                        const value = data[idx];

                        if (value !== -9999 && value !== -32768 && value !== null &&
                            !isNaN(value) && isFinite(value) &&
                            value >= min && value <= max) {

                            // 计算地理坐标
                            const lat = bbox[1] + (y / height) * (bbox[3] - bbox[1]);
                            const lng = bbox[0] + (x / width) * (bbox[2] - bbox[0]);

                            if (isFinite(lat) && isFinite(lng) &&
                                Math.abs(lat) <= 90 && Math.abs(lng) <= 180) {

                                const intensity = Math.max(0.1, (value - min) / elevationRange);
                                batchPoints.push([lat, lng, intensity]);
                                pointCount++;
                            }
                        }
                    }

                    heatPoints.push(...batchPoints);

                    // 每处理一定数量的行就让出控制权
                    if (y % (step * 50) === 0) {
                        this.updateLoadingProgress('生成热力点',
                            `已处理 ${Math.round((y / height) * 100)}%`);
                        await new Promise(resolve => setTimeout(resolve, 1));
                    }
                }

                console.log(`生成 ${heatPoints.length} 个有效热力点`);
                return heatPoints;
            },

            // 坐标系转换功能
            async convertProjectedCoordinates(bbox, image) {
                try {
                    const geoKeys = image.getGeoKeys();
                    console.log('GeoTIFF坐标系信息:', geoKeys);

                    if (bbox[0] >= 100000 && bbox[0] <= 1000000) {
                        console.log('疑似UTM坐标系');
                        return this.convertUTMToWGS84(bbox);
                    }

                    if (bbox[0] >= 10000000) {
                        console.log('疑似Web Mercator坐标系');
                        return this.convertWebMercatorToWGS84(bbox);
                    }

                    if (bbox[0] >= 1000000 && bbox[0] <= 50000000) {
                        console.log('疑似中国常用投影坐标系');
                        return this.convertChinaProjectionToWGS84(bbox);
                    }

                    return null;
                } catch (error) {
                    console.warn('坐标系转换失败:', error);
                    return null;
                }
            },

            // UTM转WGS84
            convertUTMToWGS84(bbox) {
                try {
                    const centralMeridian = 117;
                    const falseEasting = 500000;
                    const scale = 0.9996;

                    const lng1 = centralMeridian + (bbox[0] - falseEasting) / (111320 * scale);
                    const lng2 = centralMeridian + (bbox[2] - falseEasting) / (111320 * scale);
                    const lat1 = bbox[1] / 111320;
                    const lat2 = bbox[3] / 111320;

                    return [lng1, lat1, lng2, lat2];
                } catch (error) {
                    console.warn('UTM转换失败:', error);
                    return null;
                }
            },

            // Web Mercator转WGS84
            convertWebMercatorToWGS84(bbox) {
                try {
                    const lng1 = bbox[0] / 20037508.34 * 180;
                    const lng2 = bbox[2] / 20037508.34 * 180;

                    let lat1 = bbox[1] / 20037508.34 * 180;
                    let lat2 = bbox[3] / 20037508.34 * 180;

                    lat1 = 180 / Math.PI * (2 * Math.atan(Math.exp(lat1 * Math.PI / 180)) - Math.PI / 2);
                    lat2 = 180 / Math.PI * (2 * Math.atan(Math.exp(lat2 * Math.PI / 180)) - Math.PI / 2);

                    return [lng1, lat1, lng2, lat2];
                } catch (error) {
                    console.warn('Web Mercator转换失败:', error);
                    return null;
                }
            },

            // 中国投影坐标系转WGS84
            convertChinaProjectionToWGS84(bbox) {
                try {
                    const scale = 0.00001;
                    const offsetX = 12500000;
                    const offsetY = 4100000;

                    const lng1 = (bbox[0] - offsetX) * scale + 113;
                    const lng2 = (bbox[2] - offsetX) * scale + 113;
                    const lat1 = (bbox[1] - offsetY) * scale + 34;
                    const lat2 = (bbox[3] - offsetY) * scale + 34;

                    if (lng1 >= 70 && lng1 <= 140 && lng2 >= 70 && lng2 <= 140 &&
                        lat1 >= 10 && lat1 <= 55 && lat2 >= 10 && lat2 <= 55) {
                        return [lng1, lat1, lng2, lat2];
                    }

                    return null;
                } catch (error) {
                    console.warn('中国投影转换失败:', error);
                    return null;
                }
            },

            // 备用坐标转换方法
            fallbackCoordinateConversion(bbox) {
                try {
                    console.log('使用备用转换方法...');

                    const xRange = bbox[2] - bbox[0];
                    const yRange = bbox[3] - bbox[1];

                    const chinaWest = 73, chinaEast = 135, chinaSouth = 18, chinaNorth = 54;

                    const lng1 = chinaWest + (bbox[0] - Math.min(...bbox)) / xRange * (chinaEast - chinaWest);
                    const lng2 = chinaWest + (bbox[2] - Math.min(...bbox)) / xRange * (chinaEast - chinaWest);
                    const lat1 = chinaSouth + (bbox[1] - Math.min(...bbox)) / yRange * (chinaNorth - chinaSouth);
                    const lat2 = chinaSouth + (bbox[3] - Math.min(...bbox)) / yRange * (chinaNorth - chinaSouth);

                    return [
                        Math.min(lng1, lng2), Math.min(lat1, lat2),
                        Math.max(lng1, lng2), Math.max(lat1, lat2)
                    ];

                } catch (error) {
                    console.warn('备用转换也失败:', error);
                    return [110, 30, 120, 40];
                }
            },

            // 确认对话框
            showConfirm(title, message) {
                return new Promise((resolve) => {
                    const result = confirm(`${title}\n\n${message}`);
                    resolve(result);
                });
            },

            // 处理GeoJSON文件
            async handleGeoJSON(file) {
                this.showLoading(true, '处理GeoJSON', '读取文件...');

                try {
                    const text = await file.text();
                    const geoJson = JSON.parse(text);

                    this.updateLoadingProgress('解析数据', '处理要素...');

                    if (geoJson.features && geoJson.features.length > 1000) {
                        await this.processGeoJSONAsync(geoJson, file.name);
                    } else {
                        this.addGeoJSONLayer(geoJson, file.name);
                    }
                } catch (error) {
                    console.error('GeoJSON处理错误:', error);
                    this.showToast('错误', '无法处理GeoJSON文件', 'error');
                } finally {
                    this.showLoading(false);
                }
            },

            // 使用异步处理处理GeoJSON
            async processGeoJSONAsync(geoJson, fileName) {
                try {
                    this.updateLoadingProgress('异步处理数据', `${geoJson.features.length} 个要素`);

                    const processed = await this.processDataAsync(geoJson.features, {
                        simplify: true,
                        tolerance: this.settings.simplifyTolerance,
                        maxFeatures: this.settings.clusterThreshold,
                        onProgress: (msg) => {
                            this.updateLoadingProgress('处理要素', msg);
                        }
                    });

                    geoJson.features = processed;
                    this.addGeoJSONLayer(geoJson, fileName);

                } catch (error) {
                    console.error('GeoJSON处理失败:', error);
                    this.showToast('处理失败', error.message, 'error');
                }
            },

            // 添加GeoJSON图层
            addGeoJSONLayer(geoJson, name) {
                const featureCount = geoJson.features ? geoJson.features.length : 1;

                this.updateLoadingProgress('创建图层', `渲染 ${featureCount} 个要素...`);

                let layer;

                // 根据要素数量选择渲染策略
                if (featureCount > this.settings.clusterThreshold && this.settings.clustering) {
                    // 使用聚合渲染
                    const markers = L.markerClusterGroup({
                        chunkedLoading: true,
                        chunkInterval: 100,
                        chunkDelay: 25
                    });

                    if (geoJson.features) {
                        geoJson.features.forEach(feature => {
                            if (feature.geometry.type === 'Point') {
                                const marker = L.marker(feature.geometry.coordinates.reverse())
                                    .bindPopup(this.createFeaturePopup(feature));
                                markers.addLayer(marker);
                            }
                        });
                    }

                    layer = markers;
                } else {
                    // 标准渲染
                    layer = L.geoJSON(geoJson, {
                        style: {
                            color: this.getRandomColor(),
                            weight: 2,
                            opacity: 0.8,
                            fillOpacity: 0.3
                        },
                        onEachFeature: (feature, layer) => {
                            if (feature.properties) {
                                layer.bindPopup(this.createFeaturePopup(feature));
                            }
                        },
                        pointToLayer: (feature, latlng) => {
                            return L.circleMarker(latlng, {
                                radius: 6,
                                fillColor: this.getRandomColor(),
                                color: "#000",
                                weight: 1,
                                opacity: 1,
                                fillOpacity: 0.8
                            });
                        }
                    });
                }

                layer.addTo(this.map);

                this.layers.push({
                    id: 'layer_' + Date.now(),
                    name: name.replace(/\.(shp|json|geojson|zip)$/i, ''),
                    layer: layer,
                    type: 'vector',
                    visible: true,
                    features: featureCount,
                    originalData: geoJson,
                    optimized: featureCount > this.settings.clusterThreshold
                });

                this.updateLayerList();
                this.updateStatistics();

                try {
                    this.map.fitBounds(layer.getBounds());
                } catch (e) {
                    console.warn('无法自动缩放到图层范围');
                }
            },

            // 创建要素弹窗内容
            createFeaturePopup(feature) {
                if (!feature.properties) return '无属性信息';

                let content = '<div style="max-height: 200px; overflow-y: auto;">';
                const props = feature.properties;

                // 限制显示的属性数量
                const keys = Object.keys(props).slice(0, 10);

                keys.forEach(key => {
                    const value = props[key];
                    if (value !== null && value !== undefined && value !== '') {
                        content += `<div style="margin: 3px 0;"><strong>${key}:</strong> ${value}</div>`;
                    }
                });

                if (Object.keys(props).length > 10) {
                    content += `<div style="color: #666; font-style: italic; margin-top: 5px;">... 还有 ${Object.keys(props).length - 10} 个属性</div>`;
                }

                content += '</div>';
                return content;
            },

            // 处理矢量图层
            async processVectorLayer(layer) {
                if (!layer.originalData) return;

                try {
                    this.updateLoadingProgress('重新处理图层', layer.name);

                    const processed = await this.processDataAsync(layer.originalData.features, {
                        simplify: true,
                        tolerance: this.settings.simplifyTolerance,
                        maxFeatures: this.settings.clusterThreshold
                    });

                    // 更新图层数据
                    layer.originalData.features = processed;

                    // 重新创建图层
                    this.map.removeLayer(layer.layer);
                    const newGeoJson = { ...layer.originalData, features: processed };
                    this.addGeoJSONLayer(newGeoJson, layer.name + '_重处理');

                } catch (error) {
                    console.error('图层处理失败:', error);
                    this.showToast('处理失败', `图层 ${layer.name} 处理失败`, 'error');
                }
            },

            // 更新图层列表
            updateLayerList() {
                const list = document.getElementById('layerList');

                if (this.layers.length === 0) {
                    list.innerHTML = '<p style="color: #95a5a6; text-align: center; font-size: 13px;">暂无图层</p>';
                    return;
                }

                list.innerHTML = this.layers.map(layer => `
                    <div class="layer-item">
                        <div class="layer-header">
                            <span class="layer-name">${layer.name}</span>
                            ${layer.optimized ? '<span style="font-size: 10px; color: #f39c12; margin-left: 5px;">优化</span>' : ''}
                            ${layer.qgisStyled ? '<span style="font-size: 10px; color: #67a9cf; margin-left: 5px;">QGIS</span>' : ''}
                        </div>
                        <div class="layer-controls">
                            <button class="layer-btn" onclick="app.toggleLayer('${layer.id}')" title="显示/隐藏">
                                <i class="fas fa-eye${layer.visible ? '' : '-slash'}"></i>
                            </button>
                            <button class="layer-btn" onclick="app.zoomToLayer('${layer.id}')" title="缩放">
                                <i class="fas fa-search-plus"></i>
                            </button>
                            <button class="layer-btn" onclick="app.removeLayer('${layer.id}')" title="删除">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                        <div class="layer-info">
                            类型: ${this.getLayerTypeLabel(layer.type)}
                            ${layer.features ? ` | 要素: ${layer.features.toLocaleString()}` : ''}
                            ${layer.statistics ? ` | ${layer.statistics.resolution || ''}` : ''}
                            ${layer.style && layer.style.type ? ` | ${layer.style.type === 'graduated' ? '分级渲染' : layer.style.type === 'categorized' ? '分类渲染' : '简单渲染'}` : ''}
                            ${layer.cluster ? ' | 聚合模式' : ''}
                        </div>
                    </div>
                `).join('');
            },

            // 获取图层类型标签
            getLayerTypeLabel(type) {
                const labels = {
                    'point': '点',
                    'line': '线',
                    'polygon': '面',
                    'raster': '栅格',
                    'heatmap': '热力图',
                    'vector': '矢量'
                };
                return labels[type] || type;
            },

            // 更新统计
            updateStatistics() {
                document.getElementById('layerCount').textContent = this.layers.length;

                let totalFeatures = 0;
                this.layers.forEach(layer => {
                    if (layer.features) totalFeatures += layer.features;
                });
                document.getElementById('featureCount').textContent = totalFeatures.toLocaleString();

                // 计算覆盖面积
                let totalArea = 0;
                this.layers.forEach(layer => {
                    if (layer.type === 'polygon' && layer.layer.getLatLngs) {
                        try {
                            const latlngs = layer.layer.getLatLngs()[0];
                            const polygon = turf.polygon([latlngs.map(ll => [ll.lng, ll.lat])]);
                            const area = turf.area(polygon) / 1000000;
                            totalArea += area;
                        } catch (e) { }
                    }
                });
                document.getElementById('areaCount').textContent = totalArea.toFixed(2) + ' km²';

                this.updateChart();
            },

            // 更新图表
            updateChart() {
                const ctx = document.getElementById('statsChart').getContext('2d');

                const types = {};
                this.layers.forEach(layer => {
                    const type = this.getLayerTypeLabel(layer.type);
                    types[type] = (types[type] || 0) + 1;
                });

                if (Object.keys(types).length === 0) {
                    types['无数据'] = 1;
                }

                if (this.chart) {
                    this.chart.destroy();
                }

                this.chart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(types),
                        datasets: [{
                            data: Object.values(types),
                            backgroundColor: ['#3498db', '#2ecc71', '#e74c3c', '#f39c12', '#9b59b6', '#1abc9c']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#ecf0f1',
                                    font: { size: 11 }
                                }
                            }
                        }
                    }
                });
            },

            // 切换图层显示
            toggleLayer(id) {
                const layer = this.layers.find(l => l.id === id);
                if (!layer) return;

                layer.visible = !layer.visible;
                if (layer.visible) {
                    this.map.addLayer(layer.layer);
                } else {
                    this.map.removeLayer(layer.layer);
                }

                this.updateLayerList();
            },

            // 缩放到图层
            zoomToLayer(id) {
                const layer = this.layers.find(l => l.id === id);
                if (!layer) return;

                try {
                    this.map.fitBounds(layer.layer.getBounds());
                } catch (e) {
                    this.map.setView([34.917, 113.644], 11);
                }
            },

            // 删除图层
            removeLayer(id) {
                const index = this.layers.findIndex(l => l.id === id);
                if (index === -1) return;

                const layer = this.layers[index];
                this.map.removeLayer(layer.layer);
                this.layers.splice(index, 1);

                this.updateLayerList();
                this.updateStatistics();
            },

            // 定位湿地
            focusWetland() {
                if (this.currentMapType === 'gis') {
                    this.map.setView([34.917, 113.644], 12);
                } else {
                    this.showToast('提示', '请切换到GIS地图查看湿地详情', 'info');
                }
                this.showToast('定位成功', '已定位到郑州黄河湿地', 'success');
            },

            // 激活工具
            activateTool(tool) {
                if (this.currentMapType !== 'gis') {
                    this.showToast('提示', '工具仅在GIS地图模式下可用', 'warning');
                    return;
                }

                document.querySelectorAll('.tool-btn').forEach(btn => {
                    btn.classList.remove('active');
                });

                if (tool === this.currentTool) {
                    this.currentTool = null;
                    this.map.off('click');
                    return;
                }

                event.target.closest('.tool-btn').classList.add('active');
                this.currentTool = tool;

                switch (tool) {
                    case 'pan':
                        this.map.dragging.enable();
                        this.map.off('click');
                        this.showToast('平移工具', '拖动地图进行平移', 'info');
                        break;

                    case 'select':
                        this.setupSelectTool();
                        break;

                    case 'measure':
                        this.setupMeasureTool();
                        break;

                    case 'draw':
                        this.setupDrawTool();
                        break;

                    case 'info':
                        this.setupInfoTool();
                        break;
                }
            },

            // 设置选择工具
            setupSelectTool() {
                this.map.off('click');
                this.map.on('click', (e) => {
                    const point = e.latlng;
                    let found = false;

                    this.layers.forEach(layer => {
                        if (layer.visible && layer.layer.getBounds) {
                            try {
                                const bounds = layer.layer.getBounds();
                                if (bounds.contains(point)) {
                                    this.showToast('选中', `已选中: ${layer.name}`, 'success');
                                    found = true;
                                }
                            } catch (e) { }
                        }
                    });

                    if (!found) {
                        this.showToast('选择', '未找到可选择的要素', 'info');
                    }
                });
                this.showToast('选择工具', '点击要素进行选择', 'info');
            },

            // 设置测量工具
            setupMeasureTool() {
                if (!this.measureLayer) {
                    this.measureLayer = L.layerGroup().addTo(this.map);
                }

                let points = [];
                this.map.off('click');
                this.map.on('click', (e) => {
                    points.push(e.latlng);

                    if (points.length > 1) {
                        L.polyline(points, { color: 'red', weight: 2 }).addTo(this.measureLayer);

                        let distance = 0;
                        for (let i = 1; i < points.length; i++) {
                            distance += points[i - 1].distanceTo(points[i]);
                        }

                        this.showToast('测量结果', `距离: ${(distance / 1000).toFixed(2)} 公里`, 'info');
                    }

                    L.circleMarker(e.latlng, { radius: 3, color: 'red' }).addTo(this.measureLayer);
                });

                this.showToast('测量工具', '点击地图测量距离，双击结束', 'info');

                this.map.on('dblclick', () => {
                    this.map.off('click');
                    points = [];
                });
            },

            // 设置绘制工具
            setupDrawTool() {
                this.map.off('click');
                let drawPoints = [];

                this.map.on('click', (e) => {
                    drawPoints.push(e.latlng);
                    L.circleMarker(e.latlng, { radius: 3, color: 'blue' }).addTo(this.drawnItems);

                    if (drawPoints.length > 1) {
                        L.polyline(drawPoints, { color: 'blue', weight: 2 }).addTo(this.drawnItems);
                    }
                });

                this.map.on('dblclick', () => {
                    if (drawPoints.length > 2) {
                        L.polygon(drawPoints, { color: 'blue', fillOpacity: 0.3 }).addTo(this.drawnItems);

                        this.layers.push({
                            id: 'drawn_' + Date.now(),
                            name: '绘制图形',
                            layer: this.drawnItems,
                            type: 'polygon',
                            visible: true,
                            features: 1
                        });

                        this.updateLayerList();
                    }
                    drawPoints = [];
                    this.map.off('click');
                });

                this.showToast('绘制工具', '点击绘制，双击完成', 'info');
            },

            // 设置信息工具
            setupInfoTool() {
                this.map.off('click');
                this.map.on('click', (e) => {
                    const popup = L.popup()
                        .setLatLng(e.latlng)
                        .setContent(`<b>位置信息</b><br>
                                   经度: ${e.latlng.lng.toFixed(6)}<br>
                                   纬度: ${e.latlng.lat.toFixed(6)}<br>
                                   缩放级别: ${this.map.getZoom()}`)
                        .openOn(this.map);
                });
                this.showToast('信息工具', '点击地图查看位置信息', 'info');
            },

            // 空间分析工具
            bufferAnalysis() {
                if (this.layers.length === 0) {
                    this.showToast('提示', '请先加载数据', 'warning');
                    return;
                }
                this.showToast('缓冲区分析', '选择要素后将生成10公里缓冲区', 'info');

                const vectorLayer = this.layers.find(l => l.type === 'point' || l.type === 'line' || l.type === 'polygon');
                if (vectorLayer && vectorLayer.layer.toGeoJSON) {
                    const geoJson = vectorLayer.layer.toGeoJSON();
                    const buffered = turf.buffer(geoJson, 10, { units: 'kilometers' });

                    this.addGeoJSONLayer(buffered, vectorLayer.name + '_缓冲区');
                    this.showToast('分析完成', '已生成10公里缓冲区', 'success');
                }
            },

            intersectAnalysis() {
                this.showToast('相交分析', '请选择两个图层进行相交分析', 'info');
            },

            unionAnalysis() {
                this.showToast('合并分析', '请选择要合并的图层', 'info');
            },

            clipAnalysis() {
                this.showToast('裁剪分析', '请选择裁剪范围和目标图层', 'info');
            },

            heatmapAnalysis() {
                const pointLayers = this.layers.filter(l => l.type === 'point' || l.type === 'vector');
                if (pointLayers.length === 0) {
                    this.showToast('提示', '需要点数据才能生成热力图', 'warning');
                    return;
                }

                // 使用现有点数据生成热力图
                const layer = pointLayers[0];
                if (layer.originalData && layer.originalData.features) {
                    const heatPoints = [];

                    layer.originalData.features.forEach(feature => {
                        if (feature.geometry.type === 'Point') {
                            const coords = feature.geometry.coordinates;
                            heatPoints.push([coords[1], coords[0], Math.random()]);
                        }
                    });

                    if (heatPoints.length > 0) {
                        const heatLayer = L.heatLayer(heatPoints, {
                            radius: 25,
                            blur: 15,
                            maxZoom: 17
                        }).addTo(this.map);

                        this.layers.push({
                            id: 'heat_' + Date.now(),
                            name: `${layer.name}_热力图`,
                            layer: heatLayer,
                            type: 'heatmap',
                            visible: true,
                            features: heatPoints.length
                        });

                        this.updateLayerList();
                        this.showToast('热力图', `已生成热力图 (${heatPoints.length} 点)`, 'success');
                        return;
                    }
                }

                // 降级到示例热力图
                const heatPoints = [];
                for (let i = 0; i < 100; i++) {
                    const lat = 34.4 + Math.random() * 1;
                    const lng = 113.3 + Math.random() * 1;
                    const intensity = Math.random();
                    heatPoints.push([lat, lng, intensity]);
                }

                const heatLayer = L.heatLayer(heatPoints, {
                    radius: 25,
                    blur: 15,
                    maxZoom: 17
                }).addTo(this.map);

                this.layers.push({
                    id: 'heat_' + Date.now(),
                    name: '示例热力图',
                    layer: heatLayer,
                    type: 'heatmap',
                    visible: true,
                    features: heatPoints.length
                });

                this.updateLayerList();
                this.showToast('热力图', '已生成示例热力图', 'success');
            },

            contourAnalysis() {
                const demLayers = this.layers.filter(l => l.type === 'raster');
                if (demLayers.length === 0) {
                    this.showToast('提示', '需要DEM数据才能生成等值线', 'warning');
                    return;
                }
                this.showToast('等值线分析', '基于DEM生成等值线功能开发中...', 'info');
            },

            // 导出地图
            exportMap() {
                this.showToast('导出', '正在准备地图导出...', 'info');

                const mapContainer = this.currentMapType === 'gis' ?
                    document.getElementById('map') :
                    document.getElementById('statsMap');

                html2canvas(mapContainer).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `河南省${this.currentMapType === 'gis' ? 'GIS' : '统计'}地图_${new Date().getTime()}.png`;
                    link.href = canvas.toDataURL();
                    link.click();

                    this.showToast('导出成功', '地图已保存为图片', 'success');
                }).catch(error => {
                    const mapState = {
                        type: this.currentMapType,
                        center: this.currentMapType === 'gis' ? this.map.getCenter() : { lat: 34.746, lng: 113.625 },
                        zoom: this.currentMapType === 'gis' ? this.map.getZoom() : 7,
                        layers: this.layers.map(l => ({
                            name: l.name,
                            type: l.type,
                            visible: l.visible,
                            features: l.features,
                            style: l.style
                        })),
                        performance: {
                            layerCount: this.layers.length,
                            totalFeatures: this.layers.reduce((sum, l) => sum + (l.features || 0), 0),
                            optimizedLayers: this.layers.filter(l => l.optimized).length,
                            qgisStyledLayers: this.layers.filter(l => l.qgisStyled).length
                        }
                    };

                    const blob = new Blob([JSON.stringify(mapState, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `河南省地图配置_${new Date().getTime()}.json`;
                    link.href = url;
                    link.click();

                    this.showToast('导出成功', '已导出地图配置文件', 'success');
                });
            },

            // 切换侧边栏
            toggleSidebar() {
                const sidebar = document.getElementById('sidebar');
                const icon = document.getElementById('toggleIcon');

                sidebar.classList.toggle('collapsed');

                if (sidebar.classList.contains('collapsed')) {
                    icon.classList.remove('fa-chevron-left');
                    icon.classList.add('fa-chevron-right');
                } else {
                    icon.classList.remove('fa-chevron-right');
                    icon.classList.add('fa-chevron-left');
                }
            },

            // 更新加载进度
            updateLoadingProgress(text, progress) {
                document.getElementById('loadingText').textContent = text;
                document.getElementById('loadingProgress').textContent = progress;
            },

            // 显示加载动画
            showLoading(show, text = '正在处理数据...', progress = '请稍候') {
                const loading = document.getElementById('loading');
                if (show) {
                    document.getElementById('loadingText').textContent = text;
                    document.getElementById('loadingProgress').textContent = progress;
                    loading.classList.add('active');
                } else {
                    loading.classList.remove('active');
                }
            },

            // 显示提示
            showToast(title, message, type = 'info') {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.innerHTML = `
                    <div style="font-weight: 600; margin-bottom: 5px;">${title}</div>
                    <div style="font-size: 13px; white-space: pre-line;">${message}</div>
                `;

                document.body.appendChild(toast);

                setTimeout(() => {
                    toast.style.animation = 'slideIn 0.3s reverse';
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            },

            // 获取随机颜色
            getRandomColor() {
                const colors = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c'];
                return colors[Math.floor(Math.random() * colors.length)];
            },

            // 设置事件监听
            setupEventListeners() {
                // SHP文件
                document.getElementById('shpFile').addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        this.handleSHP(Array.from(e.target.files));
                    }
                });

                // DEM文件
                document.getElementById('demFile').addEventListener('change', (e) => {
                    if (e.target.files[0]) {
                        this.handleDEM(e.target.files[0]);
                    }
                });

                // GeoJSON文件
                document.getElementById('jsonFile').addEventListener('change', (e) => {
                    if (e.target.files[0]) {
                        this.handleGeoJSON(e.target.files[0]);
                    }
                });

                // 设置监听
                document.getElementById('clusterThreshold').addEventListener('change', () => {
                    this.applySettings();
                });

                document.getElementById('simplifyTolerance').addEventListener('change', () => {
                    this.applySettings();
                });

                // 窗口调整
                window.addEventListener('resize', () => {
                    if (this.currentMapType === 'gis') {
                        this.map.invalidateSize();
                    } else {
                        this.statsChart.resize();
                    }
                });

                // 内存清理
                window.addEventListener('beforeunload', () => {
                    if (this.performanceMonitor) {
                        clearInterval(this.performanceMonitor);
                    }
                    // 清理图层和地图资源
                    this.layers.forEach(layer => {
                        if (layer.layer && this.map.hasLayer(layer.layer)) {
                            this.map.removeLayer(layer.layer);
                        }
                    });
                });
            }
        };

        const loadRemoteData = async () => {
            if (!window.API) return;
            try {
                const [obsRes, zonesRes, transectsRes] = await Promise.all([
                    API.getObservations().catch(() => ({ data: [] })),
                    API.getZones().catch(() => ({ data: [] })),
                    API.getTransects().catch(() => ({ data: [] }))
                ]);
                const observations = obsRes.data || [];
                const zones = zonesRes.data || [];
                const transects = transectsRes.data || [];

                if (app.map && Array.isArray(observations)) {
                    observations.forEach(item => {
                        if (item.lat && item.lng) {
                            const marker = L.marker([item.lat, item.lng]);
                            marker.bindPopup(`<b>${item.species || '观测'}</b><br/>数量: ${item.count || '-'}<br/>状态: ${item.status || '-'}`);
                            marker.addTo(app.map);
                        }
                    });
                }

                if (app.map && Array.isArray(zones)) {
                    zones.forEach(zone => {
                        if (zone.lat && zone.lng) {
                            const marker = L.circleMarker([zone.lat, zone.lng], { radius: 6, color: '#2ecc71' });
                            marker.bindPopup(`<b>${zone.name || '监测点'}</b>`);
                            marker.addTo(app.map);
                        }
                    });
                }

                if (app.map && Array.isArray(transects)) {
                    transects.forEach(line => {
                        if (Array.isArray(line.coordinates)) {
                            const latlngs = line.coordinates.map(c => [c.lat, c.lng]).filter(p => p[0] && p[1]);
                            if (latlngs.length > 1) {
                                L.polyline(latlngs, { color: '#3498db', weight: 3, opacity: 0.7 }).addTo(app.map);
                            }
                        }
                    });
                }
            } catch (error) {
                console.warn('加载远程数据失败', error);
            }
        };

        // 启动应用
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
            loadRemoteData();
        });
    </script>
</body>

</html>
