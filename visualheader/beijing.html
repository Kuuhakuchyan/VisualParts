<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>北京市科技地图</title>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #0f1621;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #province-map {
            width: 100%;
            height: 80vh;
        }
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            background: #1a2b5a;
            color: #fff;
            border: 1px solid #0a2dae;
            border-radius: 4px;
            cursor: pointer;
            z-index: 100;
        }
        .province-info {
            padding: 20px;
            background: rgba(10,30,60,0.8);
            margin: 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <button class="back-button" onclick="window.location.href='tech_map.html'">← 返回全国</button>
    <div id="province-map"></div>
    <div class="province-info">
        <h2>北京市信息</h2>
        <p>面积：16410平方公里</p>
        <p>人口：2189万人</p>
        <p>GDP：40269亿元</p>
    </div>

    <script>
        const mapChart = echarts.init(document.getElementById('province-map'));
        const provinceName = '北京市';
        
        // 加载北京市地图数据
        $.get(`https://geo.datav.aliyun.com/areas_v3/bound/110000_full.json`, function(geoJson) {
            echarts.registerMap(provinceName, geoJson);
            
            mapChart.setOption({
                backgroundColor: '#0f1621',
                title: {
                    text: provinceName,
                    left: 'center',
                    textStyle: {
                        color: '#fff'
                    }
                },
                geo: {
                    map: provinceName,
                    roam: true,
                    itemStyle: {
                        areaColor: '#1a2b5a',
                        borderColor: '#0a2dae'
                    },
                    emphasis: {
                        itemStyle: {
                            areaColor: '#2a91d8'
                        }
                    }
                }
            });
        });
    </script>
</body>
</html>
