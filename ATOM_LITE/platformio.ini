[env:m5stack-atom]
platform = espressif32@6.7.0
board = m5stack-atom
framework = arduino

upload_speed = 1500000
monitor_speed = 115200

board_build.partitions = partitions.csv
build_flags =
    -DCORE_DEBUG_LEVEL=3

lib_deps =
    M5Unified=https://github.com/m5stack/M5Unified
    WebServer
    DNSServer
    adafruit/Adafruit NeoPixel @ ^1.12.0
